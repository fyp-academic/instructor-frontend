
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Instructor Portal | APES LMS</title>
    <meta name="description" content="APES Instructor Portal — manage your courses, host AI-powered live sessions, track student engagement, and deliver personalised learning experiences." />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://apesguide.codagenz.com/" />
    <meta property="og:title" content="APES Instructor Portal" />
    <meta property="og:description" content="Manage your courses, host live sessions, and track student engagement with AI-powered insights on the APES Instructor Portal." />
    <meta property="og:site_name" content="APES eLearning" />

    <!-- Theme -->
    <meta name="theme-color" content="#0c1e4a" />
    <meta name="application-name" content="APES Instructor" />

    <!-- No-flash theme: apply the persisted editorial light/dark choice before
         first paint. Light is the default; only add `.dark` when explicitly stored. -->
    <script>
      (function () {
        try {
          if (localStorage.getItem('apes-theme') === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>

    <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
